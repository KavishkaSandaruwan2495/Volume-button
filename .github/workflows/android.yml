name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Create Missing Env File
      run: |
        touch .env.example
        touch .env

    # මෙතනින් අපි හරියටම keystore එක app folder එක ඇතුළටම හදලා දෙනවා
    - name: Generate Debug Keystore
      run: |
        keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Setup Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 9.3.1

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # නිවැරදි පැත් එක දීලා රිලීස් එක ඔටෝ සයින් කරනවා
    - name: Build Release APK
      run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=debug.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=androiddebugkey -Pandroid.injected.signing.key.password=android --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/
